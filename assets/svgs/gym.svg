<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" fill="#1A1A2E"/>
  <!-- Gym floor -->
  <rect x="0" y="480" width="800" height="120" fill="#16213E"/>
  <rect x="0" y="478" width="800" height="6" fill="#E63946"/>

  <!-- Wall decoration - power lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#E63946" strokeWidth="3" opacity="0.4"/>
  <line x1="0" y1="104" x2="800" y2="104" stroke="#FF6B35" strokeWidth="1" opacity="0.3"/>

  <!-- Barbell on rack (background) -->
  <rect x="560" y="220" width="20" height="200" rx="4" fill="#2A2A4A"/>
  <rect x="580" y="220" width="20" height="200" rx="4" fill="#2A2A4A"/>
  <rect x="520" y="200" width="100" height="12" rx="3" fill="#3A3A5A"/>

  <!-- Barbell -->
  <rect x="450" y="380" width="280" height="12" rx="6" fill="#888888"/>
  <!-- Left weights -->
  <rect x="440" y="358" width="30" height="56" rx="4" fill="#E63946"/>
  <rect x="418" y="365" width="24" height="42" rx="3" fill="#C0392B"/>
  <rect x="400" y="370" width="20" height="32" rx="3" fill="#E63946"/>
  <!-- Right weights -->
  <rect x="710" y="358" width="30" height="56" rx="4" fill="#E63946"/>
  <rect x="738" y="365" width="24" height="42" rx="3" fill="#C0392B"/>
  <rect x="760" y="370" width="20" height="32" rx="3" fill="#E63946"/>

  <!-- Athlete lifting barbell -->
  <!-- Body -->
  <rect x="555" y="280" width="70" height="100" rx="10" fill="#2196F3"/>
  <!-- Head -->
  <circle cx="590" cy="255" r="32" fill="#E8B896"/>
  <!-- Hair (short) -->
  <path d="M560 248 Q568 218 590 220 Q612 218 620 248" fill="#2C1810"/>
  <!-- Arms raised -->
  <path d="M555 290 Q520 270 505 250 Q510 240 520 245 Q535 265 545 280" fill="#E8B896"/>
  <path d="M625 290 Q660 270 675 250 Q670 240 660 245 Q645 265 635 280" fill="#E8B896"/>
  <!-- Muscles emphasized -->
  <ellipse cx="545" cy="272" rx="12" ry="10" fill="#D4956A" opacity="0.6"/>
  <ellipse cx="635" cy="272" rx="12" ry="10" fill="#D4956A" opacity="0.6"/>
  <!-- Shorts -->
  <rect x="555" y="375" width="70" height="40" rx="6" fill="#0D47A1"/>
  <!-- Legs -->
  <rect x="558" y="408" width="25" height="70" rx="6" fill="#E8B896"/>
  <rect x="597" y="408" width="25" height="70" rx="6" fill="#E8B896"/>
  <!-- Shoes -->
  <rect x="550" y="472" width="38" height="14" rx="6" fill="#333333"/>
  <rect x="590" y="472" width="38" height="14" rx="6" fill="#333333"/>

  <!-- Barbell being held -->
  <rect x="505" y="244" width="170" height="10" rx="5" fill="#888888"/>
  <rect x="494" y="230" width="22" height="38" rx="4" fill="#E63946"/>
  <rect x="474" y="235" width="18" height="28" rx="3" fill="#C0392B"/>
  <rect x="664" y="230" width="22" height="38" rx="4" fill="#E63946"/>
  <rect x="686" y="235" width="18" height="28" rx="3" fill="#C0392B"/>

  <!-- Dumbbells on floor -->
  <rect x="50" y="440" width="100" height="12" rx="6" fill="#666666"/>
  <rect x="40" y="428" width="24" height="36" rx="4" fill="#E63946"/>
  <rect x="140" y="428" width="24" height="36" rx="4" fill="#E63946"/>

  <rect x="200" y="448" width="80" height="10" rx="5" fill="#666666"/>
  <rect x="192" y="437" width="20" height="32" rx="3" fill="#FF9800"/>
  <rect x="268" y="437" width="20" height="32" rx="3" fill="#FF9800"/>

  <!-- Motivational text decoration -->
  <rect x="30" y="80" width="240" height="60" rx="8" fill="#E63946" opacity="0.15"/>
  <text x="150" y="108" textAnchor="middle" fontFamily="sans-serif" fontSize="16" fontWeight="bold" fill="#E63946">PowerFit</text>
  <text x="150" y="130" textAnchor="middle" fontFamily="sans-serif" fontSize="12" fill="#FFFFFF" opacity="0.7">Tel Aviv</text>

  <!-- Treadmill (right side) -->
  <rect x="30" y="340" width="220" height="90" rx="8" fill="#2A2A4A"/>
  <rect x="50" y="350" width="180" height="60" rx="4" fill="#1A1A3E"/>
  <rect x="55" y="355" width="170" height="50" rx="3" fill="#16213E"/>
  <!-- Treadmill belt -->
  <rect x="60" y="370" width="160" height="25" rx="2" fill="#333355"/>
  <line x1="80" y1="370" x2="80" y2="395" stroke="#4A4A6A" strokeWidth="2"/>
  <line x1="110" y1="370" x2="110" y2="395" stroke="#4A4A6A" strokeWidth="2"/>
  <line x1="140" y1="370" x2="140" y2="395" stroke="#4A4A6A" strokeWidth="2"/>
  <line x1="170" y1="370" x2="170" y2="395" stroke="#4A4A6A" strokeWidth="2"/>
  <line x1="200" y1="370" x2="200" y2="395" stroke="#4A4A6A" strokeWidth="2"/>
  <!-- Handles -->
  <rect x="50" y="290" width="8" height="65" rx="4" fill="#888888"/>
  <rect x="242" y="290" width="8" height="65" rx="4" fill="#888888"/>
  <rect x="50" y="288" width="60" height="8" rx="4" fill="#888888"/>
  <rect x="190" y="288" width="60" height="8" rx="4" fill="#888888"/>

  <!-- Stats/heart rate display -->
  <rect x="100" y="158" width="100" height="50" rx="4" fill="#0D47A1"/>
  <text x="150" y="180" textAnchor="middle" fontFamily="monospace" fontSize="10" fill="#00FF88">♥ 142 BPM</text>
  <text x="150" y="196" textAnchor="middle" fontFamily="monospace" fontSize="10" fill="#FFFF00">8.5 km/h</text>

  <!-- Sparkle/energy lines around lifter -->
  <line x1="490" y1="220" x2="475" y2="205" stroke="#FFB800" strokeWidth="2" opacity="0.7"/>
  <line x1="520" y1="210" x2="512" y2="192" stroke="#FFB800" strokeWidth="2" opacity="0.7"/>
  <line x1="690" y1="220" x2="705" y2="205" stroke="#FFB800" strokeWidth="2" opacity="0.7"/>
  <line x1="660" y1="210" x2="668" y2="192" stroke="#FFB800" strokeWidth="2" opacity="0.7"/>
</svg>
