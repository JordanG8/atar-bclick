  <rect x="0" y="240" width="280" height="12" fill="#6B4E2A"/>
  <rect x="0" y="360" width="280" height="12" fill="#6B4E2A"/>
  <rect x="0" y="480" width="280" height="12" fill="#6B4E2A"/>
  <!-- Books row 1 -->
  <rect x="10" y="70" width="18" height="48" rx="2" fill="#C0392B"/>
  <rect x="30" y="80" width="22" height="38" rx="2" fill="#2980B9"/>
  <rect x="54" y="72" width="16" height="46" rx="2" fill="#27AE60"/>
  <rect x="72" y="78" width="20" height="40" rx="2" fill="#8E44AD"/>
  <rect x="94" y="70" width="14" height="48" rx="2" fill="#E67E22"/>
  <rect x="110" y="76" width="22" height="42" rx="2" fill="#C0392B"/>
  <rect x="134" y="72" width="18" height="46" rx="2" fill="#2C3E50"/>
  <rect x="154" y="80" width="16" height="38" rx="2" fill="#16A085"/>
  <rect x="172" y="74" width="20" height="44" rx="2" fill="#8E44AD"/>
  <rect x="194" y="78" width="18" height="40" rx="2" fill="#C0392B"/>
  <rect x="214" y="70" width="22" height="48" rx="2" fill="#2980B9"/>
  <rect x="238" y="76" width="20" height="42" rx="2" fill="#27AE60"/>
  <rect x="260" y="72" width="18" height="46" rx="2" fill="#E67E22"/>
  <!-- Books row 2 -->
  <rect x="10" y="185" width="20" height="53" rx="2" fill="#2C3E50"/>
  <rect x="32" y="190" width="16" height="48" rx="2" fill="#C0392B"/>
  <rect x="50" y="185" width="22" height="53" rx="2" fill="#8E44AD"/>
  <rect x="74" y="188" width="18" height="50" rx="2" fill="#E67E22"/>
  <rect x="94" y="183" width="20" height="55" rx="2" fill="#2980B9"/>
  <rect x="116" y="188" width="16" height="50" rx="2" fill="#27AE60"/>
  <rect x="134" y="185" width="22" height="53" rx="2" fill="#C0392B"/>
  <rect x="158" y="190" width="18" height="48" rx="2" fill="#16A085"/>
  <rect x="178" y="186" width="20" height="52" rx="2" fill="#2C3E50"/>
  <rect x="200" y="189" width="16" height="49" rx="2" fill="#8E44AD"/>
  <rect x="218" y="183" width="24" height="55" rx="2" fill="#E67E22"/>
  <rect x="244" y="187" width="18" height="51" rx="2" fill="#2980B9"/>

  <!-- Desk -->
  <rect x="180" y="400" width="540" height="20" rx="4" fill="#5C3D1E"/>
  <rect x="280" y="420" width="30" height="120" fill="#4A2E0E"/>
  <rect x="620" y="420" width="30" height="120" fill="#4A2E0E"/>
  <rect x="180" y="395" width="540" height="12" rx="3" fill="#7A5230"/>

  <!-- Desk surface items -->
  <!-- Scale of justice -->
  <rect x="580" y="310" width="4" height="90" fill="#C0A060"/>
  <rect x="548" y="310" width="68" height="4" rx="2" fill="#C0A060"/>
  <!-- Left scale pan -->
  <path d="M548 314 Q536 330 548 340 L580 340 Q592 330 580 314 Z" fill="#D4B870" stroke="#C0A060" strokeWidth="1"/>
  <!-- Right scale pan -->
  <path d="M548 314 Q536 330 548 340" stroke="#C0A060" strokeWidth="2" fill="none"/>
  <path d="M616 314 Q628 330 616 340 L584 340 Q572 330 584 314 Z" fill="#D4B870" stroke="#C0A060" strokeWidth="1"/>
  <circle cx="582" cy="305" r="6" fill="#C0A060"/>

  <!-- Gavel -->
  <rect x="350" y="355" width="80" height="22" rx="8" fill="#5C3D1E"/>
  <rect x="380" y="340" width="12" height="55" rx="3" fill="#7A5230" transform="rotate(30 386 367)"/>

  <!-- Document/contract -->
  <rect x="420" y="320" width="100" height="130" rx="4" fill="#FFFDE7" stroke="#DDDDAA" strokeWidth="1"/>
  <line x1="432" y1="340" x2="508" y2="340" stroke="#AAAAAA" strokeWidth="1.5"/>
  <line x1="432" y1="355" x2="508" y2="355" stroke="#AAAAAA" strokeWidth="1.5"/>
  <line x1="432" y1="370" x2="508" y2="370" stroke="#AAAAAA" strokeWidth="1.5"/>
  <line x1="432" y1="385" x2="490" y2="385" stroke="#AAAAAA" strokeWidth="1.5"/>
  <line x1="432" y1="400" x2="500" y2="400" stroke="#AAAAAA" strokeWidth="1.5"/>
  <!-- Signature area -->
  <line x1="432" y1="435" x2="515" y2="435" stroke="#333333" strokeWidth="2"/>
  <path d="M435 430 Q445 418 455 428 Q465 436 475 424" stroke="#2C3E50" strokeWidth="2" fill="none"/>
  <!-- Stamp/seal -->
  <circle cx="495" cy="430" r="12" fill="none" stroke="#C0392B" strokeWidth="2"/>
  <circle cx="495" cy="430" r="8" fill="none" stroke="#C0392B" strokeWidth="1"/>
  <text x="495" y="434" textAnchor="middle" fontFamily="serif" fontSize="7" fill="#C0392B">חתום</text>

  <!-- Lawyer figure -->
  <circle cx="280" cy="280" r="40" fill="#D4A574"/>
  <!-- Dark suit -->
  <path d="M235 320 L240 400 L320 400 L325 320 Q305 310 302 295 L258 295 Q255 310 235 320Z" fill="#1A1A2E"/>
  <!-- White shirt/tie area -->
  <path d="M270 295 L280 340 L290 295 Z" fill="#FFFFFF"/>
  <path d="M278 310 L282 340 L286 310 Z" fill="#C0392B"/>
  <!-- Lapels -->
  <path d="M258 295 L270 310 L255 340" fill="#1A1A2E" stroke="#2A2A3E" strokeWidth="1"/>
  <path d="M302 295 L290 310 L305 340" fill="#1A1A2E" stroke="#2A2A3E" strokeWidth="1"/>
  <!-- Brief/document in hand -->
  <rect x="320" y="330" width="55" height="45" rx="4" fill="#8B6B45"/>
  <rect x="325" y="335" width="45" height="35" rx="2" fill="#A0804A"/>
  <rect x="340" y="327" width="15" height="8" rx="3" fill="#8B6B45"/>

  <!-- Glasses on lawyer -->
  <circle cx="270" cy="270" r="10" fill="none" stroke="#5C3D1E" strokeWidth="2"/>
  <circle cx="292" cy="270" r="10" fill="none" stroke="#5C3D1E" strokeWidth="2"/>
  <line x1="280" y1="270" x2="282" y2="270" stroke="#5C3D1E" strokeWidth="2"/>
  <line x1="260" y1="270" x2="255" y2="268" stroke="#5C3D1E" strokeWidth="2"/>
  <line x1="302" y1="270" x2="307" y2="268" stroke="#5C3D1E" strokeWidth="2"/>

  <!-- Office nameplate -->
  <rect x="310" y="450" width="220" height="45" rx="6" fill="#2C3E50"/>
  <text x="420" y="470" textAnchor="middle" fontFamily="serif" fontSize="11" fill="#D4B870">משרד עורכי דין</text>
  <text x="420" y="488" textAnchor="middle" fontFamily="serif" fontSize="10" fill="#FFFFFF">Cohen &amp; Associates</text>

  <!-- Window light from right -->
  <rect x="640" y="60" width="160" height="280" rx="8" fill="#E8F4FD"/>
  <path d="M640 60 Q720 20 800 60 L800 0 L640 0 Z" fill="#E8F4FD"/>
  <line x1="720" y1="60" x2="720" y2="340" stroke="#BBBBBB" strokeWidth="2"/>
  <line x1="640" y1="200" x2="800" y2="200" stroke="#BBBBBB" strokeWidth="2"/>
</svg>
